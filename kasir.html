<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir IronFit</title>
<style>
:root{
  --bg:#0f0f12; --panel:#16161a; --panel-2:#1c1c22; --text:#f0f0f5; --muted:#9aa3b2;
  --accent:#ff4d4d; --accent-2:#ff8c42; --nav-active:#7c3aed; --nav-active-2:#a855f7;
  --border:#27272f; --font:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
.navbar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:rgba(22,22,26,0.92);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.navbar .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent-2));font-size:18px;}
.navbar h1{font-size:18px;font-weight:800;}
.wrap{max-width:720px;margin:0 auto;padding:20px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:18px;}
.card h2{font-size:16px;margin-bottom:14px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:var(--font);}
.field textarea{resize:vertical;min-height:60px;}
.row2{display:flex;gap:12px;}
.row2 .field{flex:1;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--nav-active),var(--nav-active-2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);}
.btn:active{transform:translateY(1px);}
.del-btn{padding:6px 10px;border:none;border-radius:8px;background:#3a1d1d;color:#ff6b6b;font-size:12px;cursor:pointer;font-family:var(--font);}
.del-btn:hover{background:#4a2424;}
.del-btn:disabled{opacity:.5;cursor:default;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);}
th{color:var(--muted);font-weight:600;font-size:12px;}
.total{margin-top:12px;font-weight:700;}
.muted{color:var(--muted);font-size:13px;}
#pinGate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;}
#pinGate .box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:24px;width:300px;text-align:center;}
#pinGate input{padding:12px;width:100%;text-align:center;font-size:18px;border-radius:10px;border:1px solid var(--border);background:var(--panel-2);color:var(--text);margin:12px 0;}
#pinGate button{padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--nav-active),var(--nav-active-2));color:#fff;font-weight:700;cursor:pointer;}
#pinError{color:#ff6b6b;font-size:13px;min-height:16px;}
#app{display:none;}
.msg{font-size:13px;min-height:18px;margin-top:8px;}
.msg.ok{color:#2dd4a8;}
.msg.err{color:#ff6b6b;}
</style>
</head>
<body>
<div id="pinGate">
  <div class="box">
    <div style="font-size:28px">🔒</div>
    <h2 style="margin-top:8px">Kasir IronFit</h2>
    <p class="muted">Masukkan PIN</p>
    <input id="pinInput" type="password" inputmode="numeric" maxlength="12" placeholder="PIN">
    <div id="pinError"></div>
    <button id="pinBtn">Masuk</button>
  </div>
</div>

<div id="app">
  <nav class="navbar">
    <div class="logo">💪</div>
    <h1>Kasir IronFit</h1>
  </nav>
  <div class="wrap">
    <div class="card">
      <h2>Catat Pembayaran</h2>
      <div class="field">
        <label for="nama">Nama Member</label>
        <input type="text" id="nama" placeholder="Nama member" required>
      </div>
      <div class="row2">
        <div class="field">
          <label for="paket">Paket</label>
          <select id="paket">
            <option value="Harian">Harian</option>
            <option value="Mingguan">Mingguan</option>
            <option value="Bulanan">Bulanan</option>
          </select>
        </div>
        <div class="field">
          <label for="metode">Metode</label>
          <select id="metode">
            <option value="Cash">Cash</option>
            <option value="Transfer">Transfer</option>
            <option value="QRIS">QRIS</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label for="nominal">Nominal (Rp)</label>
          <input type="number" id="nominal" min="0" step="1000">
        </div>
        <div class="field">
          <label for="tanggal">Tanggal</label>
          <input type="text" id="tanggal" inputmode="numeric" placeholder="DD/MM/YYYY" maxlength="10">
        </div>
      </div>
      <div class="field">
        <label for="catatan">Catatan (opsional)</label>
        <textarea id="catatan" placeholder="Catatan"></textarea>
      </div>
      <button class="btn" id="saveBtn">Simpan</button>
      <div class="msg" id="formMsg"></div>
    </div>

    <div class="card">
      <h2>Riwayat Transaksi</h2>
      <div class="row2" style="align-items:flex-end">
        <div class="field" style="margin-bottom:0">
          <label for="filterTanggal">Filter Tanggal</label>
          <input type="text" id="filterTanggal" inputmode="numeric" placeholder="DD/MM/YYYY" maxlength="10">
        </div>
        <button class="btn" id="refreshBtn" style="width:auto;padding:12px 18px">Segarkan</button>
      </div>
      <div style="overflow-x:auto;margin-top:14px">
        <table>
          <thead><tr><th>Tanggal</th><th>Jam</th><th>Nama</th><th>Paket</th><th>Nominal</th><th>Metode</th><th>Catatan</th><th>Aksi</th></tr></thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <div class="total" id="totalLine"></div>
    </div>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxaeOK9kC6VVZi8Fq9L0OlFs8C_A8B7_zpCxF0OvzT83r_r9MAHjUceTu937Q1L98d0/exec';
const TOKEN = 'ironfit_kasir_2024';
const PIN = '1234';

// ----- PIN gate -----
const pinGate = document.getElementById('pinGate');
const pinInput = document.getElementById('pinInput');
const pinError = document.getElementById('pinError');
function tryPin() {
  if (pinInput.value === PIN) {
    pinGate.style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadHistory();
  } else {
    pinError.textContent = 'PIN salah';
  }
}
document.getElementById('pinBtn').addEventListener('click', tryPin);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryPin(); });

// ----- helpers -----
const paketNominal = { Harian: 12000, Mingguan: 45000, Bulanan: 120000 };
const paket = document.getElementById('paket');
const nominal = document.getElementById('nominal');
function todayDDMMYYYY() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  return p(d.getDate()) + '/' + p(d.getMonth() + 1) + '/' + d.getFullYear();
}
paket.addEventListener('change', () => { nominal.value = paketNominal[paket.value]; });
nominal.value = paketNominal[paket.value];
const tanggal = document.getElementById('tanggal');
tanggal.value = todayDDMMYYYY();

function autoSlash(el) {
  el.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g, '').slice(0, 8);
    if (v.length >= 5) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/' + v.slice(4);
    else if (v.length >= 4) v = v.slice(0, 2) + '/' + v.slice(2, 4) + '/';
    else if (v.length >= 2) v = v.slice(0, 2) + '/' + v.slice(2);
    e.target.value = v;
  });
}
autoSlash(tanggal);
autoSlash(document.getElementById('filterTanggal'));

const formMsg = document.getElementById('formMsg');
document.getElementById('saveBtn').addEventListener('click', () => {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Menyimpan...';
  const nama = document.getElementById('nama').value.trim();
  if (!nama) { formMsg.textContent = 'Nama member wajib diisi'; formMsg.className = 'msg err'; btn.disabled = false; btn.textContent = 'Simpan'; return; }
  const tglVal = tanggal.value.trim();
  if (tglVal !== '' && !/^\d{2}\/\d{2}\/\d{4}$/.test(tglVal)) {
    formMsg.textContent = 'Format tanggal salah (DD/MM/YYYY)'; formMsg.className = 'msg err'; btn.disabled = false; btn.textContent = 'Simpan'; return;
  }
  const tglFinal = tglVal || todayDDMMYYYY();
  const qs = new URLSearchParams({
    token: TOKEN,
    action: 'add',
    nama: nama,
    paket: paket.value,
    nominal: nominal.value || '0',
    metode: document.getElementById('metode').value,
    tanggal: tglFinal,
    catatan: document.getElementById('catatan').value.trim()
  }).toString();
  formMsg.textContent = 'Menyimpan...'; formMsg.className = 'msg';
  fetch(API + '?' + qs)
  .then(r => r.json())
  .then(res => {
    btn.disabled = false; btn.textContent = 'Simpan';
    if (res.ok) { formMsg.textContent = 'Tersimpan ✓'; formMsg.className = 'msg ok'; resetForm(); loadHistory(); }
    else { formMsg.textContent = 'Gagal: ' + (res.error || 'unknown'); formMsg.className = 'msg err'; }
  })
  .catch(err => { btn.disabled = false; btn.textContent = 'Simpan'; formMsg.textContent = 'Gagal koneksi: ' + err; formMsg.className = 'msg err'; });
});

function resetForm() {
  document.getElementById('nama').value = '';
  document.getElementById('catatan').value = '';
  nominal.value = paketNominal[paket.value];
  tanggal.value = todayDDMMYYYY();
}

const historyBody = document.getElementById('historyBody');
const totalLine = document.getElementById('totalLine');
document.getElementById('refreshBtn').addEventListener('click', loadHistory);

historyBody.addEventListener('click', e => {
  const btn = e.target.closest('.del-btn');
  if (!btn) return;
  const id = btn.getAttribute('data-id');
  if (!id) return;
  if (!confirm('Hapus transaksi ini?')) return;
  hapus(id, btn);
});

function loadHistory() {
  if (API.indexOf('PASTE') === 0) { totalLine.textContent = 'Isi API URL di kasir.html'; return; }
  fetch(API + '?token=' + encodeURIComponent(TOKEN))
    .then(r => r.json())
    .then(res => {
      const rows = res.rows || [];
      const f = document.getElementById('filterTanggal').value.trim();
      const shown = (f ? rows.filter(r => fmtTgl(r.tanggal) === f) : rows).slice().reverse();
      historyBody.innerHTML = shown.map(r => {
        const nom = Number(r.nominal || 0);
    return '<tr><td>' + esc(fmtTgl(r.tanggal)) + '</td><td>' + esc(fmtJam(r.waktu)) + '</td><td>' + esc(r.nama) + '</td><td>' + esc(r.paket) +
          '</td><td>' + (r.id ? '<button class="del-btn" data-id="' + esc(r.id) + '">Hapus</button>' : '') + '</td></tr>';
      }).join('');
      const total = shown.reduce((s, r) => s + Number(r.nominal || 0), 0);
      totalLine.textContent = 'Total' + (f ? ' (' + f + ')' : '') + ': Rp ' + total.toLocaleString('id-ID');
    })
    .catch(err => { totalLine.textContent = 'Gagal memuat riwayat: ' + err; });
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function hapus(id, btn) {
  btn.disabled = true;
  fetch(API + '?token=' + encodeURIComponent(TOKEN) + '&action=delete&id=' + encodeURIComponent(id))
    .then(r => r.json())
    .then(res => { if (res.ok) loadHistory(); else alert('Gagal: ' + (res.error || 'unknown')); })
    .catch(err => { btn.disabled = false; alert('Gagal: ' + err); });
}
function fmtTgl(t) {
  if (typeof t === 'string' && t.indexOf('T') > -1) {
    const d = new Date(t);
    const wib = new Date(d.getTime() + 7 * 3600 * 1000);
    const p = n => String(n).padStart(2, '0');
    return p(wib.getUTCDate()) + '/' + p(wib.getUTCMonth() + 1) + '/' + wib.getUTCFullYear();
  }
  return t || '';
}
function fmtJam(w) {
  if (!w) return '';
  if (typeof w === 'string' && w.indexOf('T') > -1) {
    const d = new Date(w);
    const wib = new Date(d.getTime() + 7 * 3600 * 1000);
    const p = n => String(n).padStart(2, '0');
    return p(wib.getUTCHours()) + ':' + p(wib.getUTCMinutes());
  }
  return '';
}
</script>
</body>
</html>
